<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Help Desk Heroes — Hospital IT</title>
<style>
  :root{
    --bg:#0d1b2a; --panel:#1b263b; --ink:#e0e1dd; --accent:#52b788;
    --warn:#ffb703; --bad:#e63946; --grid:#243b55;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:"Courier New",monospace;-webkit-font-smoothing:none;}
  #wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;
    justify-content:flex-start;padding:14px;gap:10px}
  h1{font-size:22px;letter-spacing:2px;margin:4px 0 0;color:var(--accent);
    text-shadow:2px 2px 0 #000}
  .sub{font-size:11px;opacity:.7;margin:0 0 4px}
  canvas{image-rendering:pixelated;image-rendering:crisp-edges;
    border:4px solid #000;box-shadow:0 0 0 4px var(--grid),0 10px 30px rgba(0,0,0,.6);
    background:#0a1622;max-width:100%;touch-action:manipulation;cursor:pointer}
  .legend{font-size:11px;opacity:.65;max-width:760px;text-align:center;line-height:1.5}
  kbd{background:#000;border:1px solid #444;border-radius:3px;padding:0 5px}
</style>
</head>
<body>
<div id="wrap">
  <h1>HELP&nbsp;DESK&nbsp;HEROES</h1>
  <p class="sub">Hospital IT — keep the doctors &amp; nurses running</p>
  <canvas id="game" width="760" height="520"></canvas>
  <p class="legend">A ticket pops up from a doctor or nurse. Read the problem, then click the
  matching IT tool at the bottom before the timer empties. Each correct fix teaches you
  one way IT supports patient care. Click anywhere to start.</p>
</div>
<script>
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;
ctx.imageSmoothingEnabled = false;

// ---------- Educational content ----------
// Each ticket maps to one of six IT tool categories.
const TOOLS = [
  {id:'access',  label:'ACCESS',   icon:'key',    color:'#ffd166', desc:'Identity & accounts'},
  {id:'reboot',  label:'REBOOT',   icon:'screen', color:'#90e0ef', desc:'Servers & PCs'},
  {id:'network', label:'NETWORK',  icon:'wifi',   color:'#80ed99', desc:'WiFi & connectivity'},
  {id:'security',label:'SECURITY', icon:'shield', color:'#ff70a6', desc:'Threats & data'},
  {id:'device',  label:'DEVICE',   icon:'printer',color:'#bdb2ff', desc:'Hardware & drivers'},
  {id:'data',    label:'INTERFACE',icon:'link',   color:'#ffb4a2', desc:'Systems talking'},
];

const TICKETS = [
  {who:'Dr. Reyes',  role:'doctor', tool:'access',
   msg:"I'm locked out of my account before rounds!",
   tip:"IT manages identity & access so only authorized staff can open patient records."},
  {who:'Nurse Kim',  role:'nurse', tool:'reboot',
   msg:"The EHR charting system froze on my station.",
   tip:"IT keeps the Electronic Health Record running — a frozen chart can stall care."},
  {who:'Nurse Patel',role:'nurse', tool:'network',
   msg:"The patient's vitals monitor dropped off WiFi!",
   tip:"Wireless monitors stream vitals to the nurses' station over IT's network."},
  {who:'Dr. Osei',   role:'doctor', tool:'security',
   msg:"I got a weird email asking for my login...",
   tip:"IT security blocks phishing & ransomware to protect patient data (HIPAA)."},
  {who:'Lab Tech Wu',role:'nurse', tool:'device',
   msg:"The wristband label printer won't print IDs.",
   tip:"IT fixes drivers so ID wristbands print — correct patient, correct meds."},
  {who:'Dr. Adler',  role:'doctor', tool:'data',
   msg:"Lab results aren't showing up in the chart.",
   tip:"IT maintains the interfaces (HL7) that let the lab system talk to the EHR."},
  {who:'Nurse Cruz', role:'nurse', tool:'access',
   msg:"New hire can't log into the med cabinet.",
   tip:"IT provisions accounts so new staff get the right access on day one."},
  {who:'Dr. Bauer',  role:'doctor', tool:'reboot',
   msg:"Surgery scheduling server is totally down.",
   tip:"IT runs failover servers so scheduling survives a crash."},
  {who:'Nurse Diaz', role:'nurse', tool:'network',
   msg:"The whole ward lost network in radiology.",
   tip:"IT manages switches & access points so imaging keeps flowing."},
  {who:'Dr. Lin',    role:'doctor', tool:'security',
   msg:"A pop-up says my files are encrypted!",
   tip:"IT isolates infected machines fast to stop ransomware spreading."},
  {who:'Nurse Bell', role:'nurse', tool:'device',
   msg:"The barcode scanner for meds is dead.",
   tip:"IT maintains scanners that verify the 5 rights of medication safety."},
  {who:'Dr. Hayes',  role:'doctor', tool:'data',
   msg:"Pharmacy orders aren't reaching the system.",
   tip:"IT keeps order-routing interfaces alive so prescriptions arrive."},
];

// ---------- Game state ----------
let state = 'menu'; // menu, play, gameover
let score=0, lives=3, level=1, solved=0;
let active=null;     // current ticket {data, t, max}
let nextIn=0;        // frames until next ticket
let toolRects=[];    // hit boxes for tools
let toast=null;      // {text, t} educational flash
let shake=0;
let particles=[];
let blink=0;

function resetGame(){
  score=0; lives=3; level=1; solved=0; active=null; nextIn=20; toast=null;
  particles=[];
}

function spawnTicket(){
  const d = TICKETS[(Math.random()*TICKETS.length)|0];
  const max = Math.max(150, 360 - level*18); // frames; faster as level climbs
  active = {data:d, t:max, max:max};
}

function addParticles(x,y,color){
  for(let i=0;i<14;i++){
    particles.push({x,y,
      vx:(Math.random()-.5)*5, vy:(Math.random()-1.2)*5,
      life:30+Math.random()*15, color});
  }
}

// ---------- Pixel drawing helpers ----------
function px(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(x|0,y|0,w|0,h|0); }
function text(str,x,y,size,c,align){
  ctx.fillStyle=c; ctx.font='bold '+size+'px "Courier New",monospace';
  ctx.textAlign=align||'left'; ctx.textBaseline='top';
  ctx.fillText(str,x,y);
}

// draw a little pixel person (doctor=white coat, nurse=teal)
function drawPerson(x,y,role){
  const coat = role==='doctor' ? '#f1faee' : '#48cae4';
  const skin = '#f2c79b', hair='#3a2e1f';
  px(x+10,y+2,12,10,hair);            // hair
  px(x+11,y+6,10,9,skin);             // face
  px(x+13,y+9,2,2,'#000'); px(x+18,y+9,2,2,'#000'); // eyes
  px(x+8,y+16,16,18,coat);            // body / coat
  px(x+15,y+16,2,18, role==='doctor'?'#cdd6df':'#0096c7'); // coat line
  px(x+4,y+18,5,14,coat); px(x+23,y+18,5,14,coat); // arms
  if(role==='doctor'){ px(x+12,y+18,8,3,'#e63946'); } // stethoscope hint
  else { px(x+12,y+15,8,3,'#fff'); px(x+15,y+12,2,4,'#e63946'); } // nurse cross
}

// tool icons (16x16-ish chunky)
function drawIcon(kind,x,y,c){
  if(kind==='key'){ px(x+2,y+5,8,6,c); px(x+5,y+7,2,2,'#0a1622'); px(x+10,y+7,12,2,c); px(x+18,y+9,2,3,c); px(x+14,y+9,2,3,c);}
  else if(kind==='screen'){ px(x+1,y+2,22,15,c); px(x+3,y+4,18,11,'#0a1622'); px(x+9,y+17,6,3,c); px(x+5,y+20,14,2,c);}
  else if(kind==='wifi'){ for(let i=0;i<3;i++){px(x+2+i*3,y+12-i*3,18-i*6,2,c);} px(x+10,y+13,3,3,c);}
  else if(kind==='shield'){ px(x+4,y+2,16,4,c); px(x+2,y+6,20,6,c); px(x+5,y+12,14,5,c); px(x+9,y+17,6,4,c); px(x+10,y+7,4,7,'#0a1622');}
  else if(kind==='printer'){ px(x+4,y+2,16,6,c); px(x+1,y+8,22,9,c); px(x+5,y+15,14,7,'#0a1622'); px(x+5,y+15,14,7,'#e0e1dd'); px(x+17,y+10,3,2,'#0a1622');}
  else if(kind==='link'){ px(x+3,y+6,9,4,c); px(x+12,y+6,9,4,c); px(x+3,y+12,9,4,c); px(x+12,y+12,9,4,c); px(x+10,y+8,4,6,c);}
}

// ---------- Layout ----------
const TRAY_Y = H-118;
function layoutTools(){
  toolRects=[];
  const n=TOOLS.length, pad=14, w=(W-pad*(n+1))/n, h=92;
  for(let i=0;i<n;i++){
    toolRects.push({x:pad+i*(w+pad), y:TRAY_Y, w:w, h:h, tool:TOOLS[i]});
  }
}
layoutTools();

// ---------- Render ----------
function draw(){
  ctx.clearRect(0,0,W,H);
  // background grid
  px(0,0,W,H,'#0a1622');
  ctx.strokeStyle='#10243a'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=20){ctx.beginPath();ctx.moveTo(x+.5,0);ctx.lineTo(x+.5,H);ctx.stroke();}
  for(let y=0;y<H;y+=20){ctx.beginPath();ctx.moveTo(0,y+.5);ctx.lineTo(W,y+.5);ctx.stroke();}

  let ox=0,oy=0;
  if(shake>0){ ox=(Math.random()-.5)*shake; oy=(Math.random()-.5)*shake; shake*=.86; if(shake<.4)shake=0; }
  ctx.save(); ctx.translate(ox,oy);

  if(state==='menu'){ drawMenu(); ctx.restore(); return; }
  if(state==='gameover'){ drawGameOver(); ctx.restore(); return; }

  // top HUD bar
  px(0,0,W,40,'#1b263b');
  text('SCORE '+score,12,12,18,'#ffd166');
  text('LEVEL '+level,250,12,18,'#90e0ef','left');
  // lives = hearts
  text('CARE',W-200,12,18,'#e0e1dd');
  for(let i=0;i<3;i++){
    const hx=W-118+i*34, c=i<lives?'#e63946':'#3a2330';
    px(hx+2,14,7,7,c); px(hx+11,14,7,7,c); px(hx,18,20,7,c); px(hx+5,24,10,5,c); px(hx+8,28,4,3,c);
  }

  // ticket card
  if(active){
    drawTicket(active);
  } else {
    text('Waiting for the next call...',W/2,150,16,'#5a7184','center');
  }

  // tool tray
  drawTray();

  // toast (educational tip)
  if(toast){ drawToast(); }

  // particles
  particles.forEach(p=>{ px(p.x,p.y,3,3,p.color); });

  ctx.restore();
}

function drawTicket(a){
  const cx=W/2, top=70, cw=560, ch=210, x=cx-cw/2;
  // monitor frame
  px(x-8,top-8,cw+16,ch+30,'#243b55');
  px(x,top,cw,ch,'#0d2438');
  px(x,top,cw,22,'#1b3a57');
  text('● INCOMING TICKET #'+(1000+solved),x+12,top+4,13,'#80ed99');

  // person
  drawPerson(x+24,top+40,a.data.role);
  // who
  text(a.data.who,x+70,top+44,16,'#ffd166');
  text(a.data.role.toUpperCase(),x+70,top+66,12,'#7a93a8');

  // speech bubble message (wrapped)
  const mx=x+70, my=top+92, mw=cw-100;
  wrapText('"'+a.data.msg+'"', mx, my, mw, 17, '#e0e1dd');

  // timer bar
  const bw=cw-40, frac=Math.max(0,a.t/a.max);
  const bx=x+20, by=top+ch-26;
  px(bx,by,bw,14,'#1b2a3a');
  const col = frac>.5?'#52b788':frac>.25?'#ffb703':'#e63946';
  px(bx,by,bw*frac,14,col);
  text('TIME',bx,by-16,11,'#5a7184');

  // hint: blinking "match the tool below"
  blink=(blink+1)%60;
  if(blink<40) text('▼ pick the right IT tool ▼',cx,top+ch+8,13,'#90e0ef','center');
}

function drawTray(){
  px(0,TRAY_Y-16,W,H-(TRAY_Y-16),'#11202f');
  text('IT TOOLKIT',14,TRAY_Y-14,12,'#5a7184');
  toolRects.forEach(r=>{
    const t=r.tool;
    px(r.x,r.y,r.w,r.h,'#1b263b');
    px(r.x,r.y,r.w,4,t.color);
    drawIcon(t.icon, r.x+r.w/2-12, r.y+14, t.color);
    text(t.label, r.x+r.w/2, r.y+44, 13, '#e0e1dd','center');
    text(t.desc, r.x+r.w/2, r.y+62, 10, '#7a93a8','center');
    ctx.textAlign='left';
  });
}

function drawToast(){
  const tw=620, th=92, x=W/2-tw/2, y=H/2-th/2;
  px(x-6,y-6,tw+12,th+12, toast.good?'#1b4332':'#5c1a1a');
  px(x,y,tw,th,'#0d2438');
  text(toast.good?'✔ FIXED!':'✘ WRONG TOOL', x+16,y+10,16, toast.good?'#80ed99':'#ff70a6');
  wrapText(toast.text, x+16, y+36, tw-32, 14, '#e0e1dd');
}

function drawMenu(){
  text('HELP DESK HEROES', W/2, 90, 30, '#52b788','center');
  text('Hospital IT Support', W/2, 130, 16, '#90e0ef','center');
  drawPerson(W/2-120, 200, 'doctor');
  drawPerson(W/2+80, 200, 'nurse');
  const lines=[
    'Doctors & nurses keep getting tech problems.',
    'You are the IT help desk. Read each ticket,',
    'then click the matching tool to fix it in time.',
    'Every fix shows how IT keeps patients safe.',
    '',
    '3 missed/wrong fixes and the shift is over.',
  ];
  lines.forEach((l,i)=>text(l,W/2,290+i*24,15,'#e0e1dd','center'));
  blink=(blink+1)%60;
  if(blink<40) text('▶ CLICK TO START SHIFT', W/2, 470, 20, '#ffd166','center');
  ctx.textAlign='left';
}

function drawGameOver(){
  text('SHIFT OVER', W/2, 140, 34, '#e63946','center');
  text('Tickets resolved: '+solved, W/2, 210, 18, '#e0e1dd','center');
  text('Final score: '+score, W/2, 245, 18, '#ffd166','center');
  let rank='IT Intern';
  if(score>=1500) rank='IT Director';
  else if(score>=900) rank='Senior Sysadmin';
  else if(score>=400) rank='Help Desk Pro';
  text('Rank: '+rank, W/2, 290, 18, '#90e0ef','center');
  text('IT keeps the hospital running so clinicians', W/2, 350, 14, '#7a93a8','center');
  text('can focus on patients. Thanks for the save!', W/2, 372, 14, '#7a93a8','center');
  blink=(blink+1)%60;
  if(blink<40) text('▶ CLICK TO PLAY AGAIN', W/2, 440, 20, '#ffd166','center');
  ctx.textAlign='left';
}

function wrapText(str,x,y,maxw,size,c){
  ctx.fillStyle=c; ctx.font='bold '+size+'px "Courier New",monospace';
  ctx.textAlign='left'; ctx.textBaseline='top';
  const words=str.split(' '); let line='', yy=y;
  for(const w of words){
    const test=line?line+' '+w:w;
    if(ctx.measureText(test).width>maxw && line){ ctx.fillText(line,x,yy); line=w; yy+=size+5; }
    else line=test;
  }
  if(line) ctx.fillText(line,x,yy);
}

// ---------- Update ----------
function update(){
  blink++;
  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=.25; p.life--; });
  particles=particles.filter(p=>p.life>0);

  if(state!=='play') return;

  if(toast){ toast.t--; if(toast.t<=0) toast=null; }

  if(active){
    active.t--;
    if(active.t<=0){ missTicket("Out of time! The ticket went unresolved."); }
  } else {
    nextIn--;
    if(nextIn<=0 && !toast){ spawnTicket(); }
  }
}

function missTicket(why){
  lives--; shake=10; active=null;
  toast={good:false, t:140, text:why+" Missed tickets slow down patient care."};
  nextIn=70;
  if(lives<=0){ state='gameover'; }
}

function tryFix(toolId){
  if(!active) return;
  const a=active;
  if(toolId===a.data.tool){
    const bonus = 50 + Math.round((a.t/a.max)*60);
    score+=bonus; solved++;
    addParticles(W/2, 180, '#80ed99');
    toast={good:true, t:170, text:a.data.tip};
    active=null; nextIn=80;
    if(solved%4===0){ level++; }
  } else {
    lives--; shake=10;
    addParticles(W/2, 360, '#ff70a6');
    const right=TOOLS.find(t=>t.id===a.data.tool);
    toast={good:false, t:170, text:"Not quite — this was a "+right.label+" issue. "+a.data.tip};
    active=null; nextIn=80;
    if(lives<=0){ state='gameover'; }
  }
}

// ---------- Input ----------
function pointer(e){
  const r=cv.getBoundingClientRect();
  const sx=W/r.width, sy=H/r.height;
  const t=e.touches?e.touches[0]:e;
  return {x:(t.clientX-r.left)*sx, y:(t.clientY-r.top)*sy};
}
function handleClick(e){
  e.preventDefault();
  if(state==='menu'){ resetGame(); state='play'; return; }
  if(state==='gameover'){ resetGame(); state='play'; return; }
  const p=pointer(e);
  for(const r of toolRects){
    if(p.x>=r.x && p.x<=r.x+r.w && p.y>=r.y && p.y<=r.y+r.h){ tryFix(r.tool.id); return; }
  }
}
cv.addEventListener('mousedown', handleClick);
cv.addEventListener('touchstart', handleClick, {passive:false});

// ---------- Loop ----------
function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
